<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物理解码者：异世法则 - 书架</title>
<link rel="stylesheet" href="styles/main.css">
<style>
.intro-banner {
  background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 40%, #1a237e 100%);
  color: #fff;
  padding: 50px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.intro-banner::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%; right: -50%; bottom: -50%;
  background: radial-gradient(ellipse at 30% 50%, rgba(92,107,192,0.15) 0%, transparent 60%);
  animation: floatBg 8s ease-in-out infinite;
}
@keyframes floatBg { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-20px,20px); } }
.intro-banner h1 { font-size: 2.4em; margin: 0; letter-spacing: 6px; position: relative; }
.intro-banner .tagline { font-size: 1.1em; opacity: 0.85; margin-top: 10px; position: relative; }
.intro-banner .stats { display: flex; justify-content: center; gap: 40px; margin-top: 24px; position: relative; }
.intro-banner .stats div { text-align: center; }
.intro-banner .stats .num { font-size: 1.6em; font-weight: 700; }
.intro-banner .stats .label { font-size: 0.75em; opacity: 0.7; }
</style>
</head>
<body>

<div class="intro-banner">
  <h1>⚡ 物理解码者：异世法则</h1>
  <p class="tagline">一个物理偏科生的异世界冒险 · 在热血故事中学会初中物理</p>
  <div class="stats">
    <div><div class="num">10</div><div class="label">全卷</div></div>
    <div><div class="num">22+</div><div class="label">物理知识点</div></div>
    <div><div class="num">20+</div><div class="label">互动实验</div></div>
  </div>
</div>

<div class="shelf-container">
  <h2 class="shelf-title">📚 卷册列表</h2>
  <div class="shelf-grid" id="shelfGrid"></div>
</div>

<script>
const volumes = [
  { num: 1, title: '漂移之原与回音峡谷', desc: '林小宇穿越到异世界「元界」，发现万物都在不停运动。他结识了流浪少女凌音，两人向传说中能让万物静止的「静止之石」进发，途中要穿越神秘的回音峡谷……', cover: '机械运动 + 声现象', badge: 'new', badgeText: '最新连载', path: 'volumes/v01-漂移之原与回音峡谷/index.html' },
  { num: 2, title: '炎寒谷的试炼', desc: '进入温度极不稳定的炎寒谷，水在冰、水、蒸汽间无序跳变。林小宇需要理解物态变化的奥秘才能破解机关，找到「温衡之石」。', cover: '物态变化', badge: 'new', badgeText: '最新连载', path: 'volumes/v02-炎寒谷的试炼/index.html' },
  { num: 3, title: '镜海迷踪', desc: '一片由无数镜面组成的海洋，光线被随意反射和折射，幻象丛生。林小宇必须理解光的传播和透镜成像才能走出这个光学迷宫。', cover: '光现象 + 透镜', badge: 'new', badgeText: '最新连载', path: 'volumes/v03-镜海迷踪/index.html' },
  { num: 4, title: '重铸之城', desc: '一座正在崩溃的城市——金属浮在空中，木头沉入地下。林小宇需要利用密度的知识帮助工匠们重建家园。', cover: '质量与密度', badge: 'soon', badgeText: '即将推出' },
  { num: 5, title: '力之试炼场', desc: '到达古竞技场，这里通过「力之试炼」决定地位。林小宇被迫参战，必须理解力、重力、摩擦力、惯性的原理才能取胜。', cover: '力 + 运动和力', badge: 'soon', badgeText: '即将推出' },
  { num: 6, title: '深渊之底', desc: '进入一个水下世界，压强和浮力完全失控。林小宇需要设计潜水装置，救援被困的居民。', cover: '压强 + 浮力', badge: 'soon', badgeText: '即将推出' },
  { num: 7, title: '齿轮森林与通天塔', desc: '一片齿轮机械森林和通天塔，林小宇需要利用杠杆、滑轮等简单机械的知识来登塔。', cover: '功和机械能 + 简单机械', badge: 'soon', badgeText: '即将推出' },
  { num: 8, title: '炎熔之心', desc: '进入火山王国，热能狂暴肆虐。林小宇要学会内能和热机知识来驯服火山。', cover: '内能 + 内能的利用', badge: 'soon', badgeText: '即将推出' },
  { num: 9, title: '雷霆城风云', desc: '元界最大的城市被雷电统治，暗影使徒总部在此。林小宇需要全面掌握电学知识来对抗邪恶势力。', cover: '电路·欧姆定律·电功率', badge: 'soon', badgeText: '即将推出' },
  { num: 10, title: '磁之秘境与归途', desc: '最终领域——通往回家的传送门就在磁场混乱的秘境中。所有伙伴集结，最后的战斗。', cover: '电与磁 + 能源', badge: 'soon', badgeText: '即将推出' }
];

const shelf = document.getElementById('shelfGrid');
const progress = JSON.parse(localStorage.getItem('physics-story-progress') || '{}');
const volsDone = JSON.parse(localStorage.getItem('physics-story-volumes') || '{}');

volumes.forEach((v, idx) => {
  const isFirst = idx === 0;
  const isUnlocked = idx <= 2 || volsDone[idx];
  const card = document.createElement('div');
  card.className = 'book-card' + (isFirst ? ' active' : '') + (isUnlocked ? '' : ' locked');
  if (!isUnlocked) card.title = '请先完成前一卷';

  const chDone = (idx <= 2) ? Object.values(progress).filter(Boolean).length : 0;
  const pct = (idx <= 2) ? Math.min(chDone / 6 * 100, 100) : 0;

  card.innerHTML = `
    <div class="vol-number">第 ${v.num} 卷</div>
    <div class="vol-title">${v.title}</div>
    <div class="vol-desc">${v.desc}</div>
    <div style="margin-top:8px;font-size:0.8em;color:#666;">📖 ${v.cover}</div>
    <div class="vol-badge badge-${v.badge}">${v.badgeText}</div>
    ${isFirst ? '<div class="progress-bar"><div class="fill" style="width:' + pct + '%"></div></div>' : ''}
  `;

  if (isUnlocked && v.path) {
    card.addEventListener('click', () => location.href = v.path);
    card.style.cursor = 'pointer';
  }
  shelf.appendChild(card);
});
</script>

</body>
</html>
